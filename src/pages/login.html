<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Login - Pomodoro Expert</title>
    <link rel="stylesheet" href="../css/login.css">
</head>

<body>

    <div class="login-card">
        <h2>Pomodoro Pro</h2>

        <div class="form-group">
            <label>Correo Electrónico</label>
            <input type="email" id="email" placeholder="admin@pomodoro.com">
        </div>

        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" id="password" placeholder="••••••••">
            <div class="show-password-row">
                <input type="checkbox" id="showPassword" class="show-password-checkbox">
                <label for="showPassword" class="show-password-label">Mostrar contraseña</label>
            </div>
        </div>

        <button class="btn-login" id="loginBtn">INGRESAR</button>

        <div id="message"></div>
    </div>

    <script src="../js/modules/auth.js"></script>
</body>

</html>
